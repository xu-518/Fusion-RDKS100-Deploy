model_parameters:
  onnx_model: 'fusion_s1002.onnx'
  output_model_file_prefix: 'fusion_s1002'
  march: 'nash-e'

input_parameters:
  input_name: 'ir_image;vis_image'
  input_type_rt: 'featuremap;featuremap'
  input_type_train: 'featuremap;featuremap'
  input_shape: '1x1x256x256;1x1x256x256'

calibration_parameters:
  cal_data_dir: './calibration_data/ir;./calibration_data/vis'
  calibration_type: 'kl'
compiler_parameters:
  compile_mode: 'latency'
  optimize_level: 'O2'
  core_num: 1